services:
  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: much_todo_db

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    image: muchtodo-backend:v1
    container_name: muchtodo-backend

    restart: unless-stopped

    depends_on:
      - mongodb

    environment:
      PORT: "8080"
      DB_NAME: much_todo_db

      JWT_SECRET_KEY: super-secret-key
      JWT_EXPIRATION_HOURS: "72"

      ENABLE_CACHE: "false"

      LOG_LEVEL: INFO
      LOG_FORMAT: json

      MONGO_URI: mongodb://admin:admin123@mongodb:27017/much_todo_db?authSource=admin

    ports:
      - "8080:8080"

volumes:
  mongo_data: